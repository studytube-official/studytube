<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyTube TikTok Demo</title>
  <style>
    :root {
      --ink: #07343b;
      --muted: rgba(7, 52, 59, 0.62);
      --cyan: #00d7ff;
      --mint: #16e5ad;
      --lime: #b9ff6b;
      --glass: rgba(246, 255, 253, 0.78);
      --stroke: rgba(0, 215, 255, 0.24);
      --shadow: 0 20px 54px rgba(0, 95, 105, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #06191d;
      color: var(--ink);
      font-family: Inter, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      aspect-ratio: 9 / 16;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(rgba(120, 255, 236, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 255, 236, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 24% 12%, rgba(22, 229, 173, 0.2), transparent 30%),
        radial-gradient(circle at 88% 30%, rgba(0, 215, 255, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(245, 255, 253, 0.12), rgba(245, 255, 253, 0.68)),
        url("../../assets/future-school-hero.png");
      background-size: 28px 28px, 28px 28px, auto, auto, auto, cover;
      background-position: top left, top left, center, center, center, 20% top;
      box-shadow: 0 34px 100px rgba(0, 0, 0, 0.52);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 78%, rgba(255, 255, 255, 0.72), transparent 34%),
        linear-gradient(180deg, rgba(239, 255, 251, 0.08), rgba(239, 255, 251, 0.72));
      z-index: -1;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, transparent 0 34%, rgba(255, 255, 255, 0.15) 35%, transparent 38%),
        linear-gradient(64deg, transparent 0 64%, rgba(0, 215, 255, 0.14) 65%, transparent 68%);
      animation: sweep 5.6s ease-in-out infinite;
      pointer-events: none;
      z-index: 30;
    }

    @keyframes sweep {
      0%, 100% { opacity: 0.18; transform: translateX(-5%); }
      50% { opacity: 0.44; transform: translateX(5%); }
    }

    .topbar {
      position: absolute;
      top: 20px;
      left: 18px;
      right: 18px;
      z-index: 35;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #00bba8;
      font-size: clamp(25px, 6vw, 34px);
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 1px 0 rgba(255,255,255,0.82);
    }

    .mark {
      width: 28px;
      height: 28px;
      background:
        linear-gradient(90deg, transparent 0 34%, #00bba8 35% 100%),
        linear-gradient(#00bba8 0 0);
      background-size: 100% 34%, 68% 34%;
      background-position: 0 0, 100% 100%;
      background-repeat: no-repeat;
      filter: drop-shadow(0 0 12px rgba(0, 215, 255, 0.34));
    }

    .nav {
      display: flex;
      gap: 6px;
    }

    .nav-pill {
      min-width: 48px;
      padding: 9px 11px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      color: #0a6870;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 8px 22px rgba(0, 150, 160, 0.12);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      backdrop-filter: blur(18px);
    }

    body[data-phase="subjects"] .nav-pill:nth-child(1),
    body[data-phase="units"] .nav-pill:nth-child(1),
    body[data-phase="videos"] .nav-pill:nth-child(1),
    body[data-phase="memo"] .nav-pill:nth-child(1),
    body[data-phase="list"] .nav-pill:nth-child(3),
    body[data-phase="sync"] .nav-pill:nth-child(2) {
      color: #fff;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      border-color: rgba(255,255,255,0.5);
    }

    .phone-screen {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 84px;
      bottom: 26px;
      border-radius: 34px;
      overflow: hidden;
      background: rgba(242, 255, 252, 0.45);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: inset 0 0 0 1px rgba(0,215,255,0.12), 0 24px 70px rgba(0,80,90,0.14);
      backdrop-filter: blur(2px);
    }

    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(24px) scale(0.985);
      transition: opacity 0.56s ease, transform 0.64s cubic-bezier(0.2, 1, 0.2, 1);
      pointer-events: none;
    }

    body[data-phase="subjects"] .scene.subjects,
    body[data-phase="units"] .scene.units,
    body[data-phase="videos"] .scene.videos,
    body[data-phase="memo"] .scene.memo,
    body[data-phase="list"] .scene.list,
    body[data-phase="sync"] .scene.sync {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .subject-field {
      position: absolute;
      inset: 22px 0 0;
    }

    .bubble {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s, 88px);
      height: var(--s, 88px);
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #0a5961;
      text-align: center;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.98), rgba(232,255,250,0.94) 44%, rgba(167,255,233,0.82));
      border: 2px solid rgba(0, 215, 255, 0.38);
      box-shadow:
        0 0 30px rgba(0, 215, 255, 0.26),
        0 16px 34px rgba(0, 126, 132, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.95);
      transform: translate(-50%, -50%);
      animation: float var(--dur, 6s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .bubble::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: inherit;
      border: 1px solid rgba(22, 229, 173, 0.32);
      box-shadow: 0 0 20px rgba(22, 229, 173, 0.22);
    }

    .bubble .icon {
      display: block;
      margin-bottom: 5px;
      font-size: 26px;
      line-height: 1;
    }

    .bubble strong {
      font-size: 14px;
      line-height: 1.1;
    }

    .bubble.math {
      --s: 110px;
      animation: selectPulse 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { margin-top: 0; }
      50% { margin-top: -12px; }
    }

    @keyframes selectPulse {
      0%, 35% { transform: translate(-50%, -50%) scale(1); }
      52% { transform: translate(-50%, -50%) scale(1.12); box-shadow: 0 0 46px rgba(22,229,173,0.5), 0 20px 44px rgba(0,126,132,0.2); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .tap-ring {
      position: absolute;
      left: 51%;
      top: 33%;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 3px solid rgba(22,229,173,0.72);
      box-shadow: 0 0 28px rgba(22,229,173,0.46);
      transform: translate(-50%, -50%) scale(0.6);
      opacity: 0;
      animation: tap 3s ease-in-out infinite;
    }

    @keyframes tap {
      16%, 26% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
      50% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
      100% { opacity: 0; }
    }

    .unit-stack {
      position: absolute;
      left: 18px;
      right: 18px;
      top: 18px;
      display: grid;
      gap: 12px;
    }

    .selected-subject {
      display: grid;
      place-items: center;
      margin: 0 auto 8px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      color: #0a5961;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.98), rgba(232,255,250,0.94) 44%, rgba(167,255,233,0.82));
      border: 2px solid rgba(0, 215, 255, 0.38);
      box-shadow: 0 0 38px rgba(0, 215, 255, 0.3), 0 18px 40px rgba(0, 126, 132, 0.16);
      text-align: center;
      font-weight: 900;
    }

    .unit-card,
    .search-bar,
    .video-card,
    .list-card,
    .sync-card,
    .history-card {
      border: 1px solid var(--stroke);
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .unit-card {
      padding: 15px 16px;
      border-radius: 22px;
      display: grid;
      grid-template-columns: 38px 1fr 32px;
      align-items: center;
      gap: 11px;
      color: #0b5158;
      font-weight: 900;
      transform: translateX(-36px);
      opacity: 0;
      animation: slideUnit 3s ease forwards;
      animation-delay: var(--d);
    }

    .unit-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      font-weight: 950;
    }

    .unit-go {
      height: 32px;
      border-radius: 999px;
      background: rgba(0,215,255,0.14);
      display: grid;
      place-items: center;
      color: #08717b;
      font-weight: 950;
    }

    @keyframes slideUnit {
      to { opacity: 1; transform: translateX(0); }
    }

    .video-layout {
      position: absolute;
      inset: 20px 14px 0;
    }

    .search-bar {
      height: 58px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 15px;
      color: #0b5158;
      font-size: 17px;
      font-weight: 900;
    }

    .search-icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
    }

    .video-list {
      margin-top: 14px;
      display: grid;
      gap: 12px;
    }

    .video-card {
      position: relative;
      display: grid;
      grid-template-columns: 126px 1fr;
      gap: 12px;
      min-height: 96px;
      padding: 10px;
      border-radius: 24px;
      overflow: hidden;
    }

    .thumb {
      position: relative;
      height: 76px;
      border-radius: 16px;
      overflow: hidden;
      background:
        radial-gradient(circle at 78% 32%, rgba(255,255,255,0.55), transparent 25%),
        linear-gradient(135deg, var(--a), var(--b));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.42);
    }

    .thumb::before,
    .thumb::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.52);
    }

    .thumb::before {
      left: 15px;
      top: 17px;
      width: 76px;
      height: 5px;
      box-shadow: 0 17px 0 rgba(255,255,255,0.38), 0 34px 0 rgba(255,255,255,0.3);
    }

    .thumb::after {
      right: 13px;
      top: 23px;
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.35);
      box-shadow: inset 10px 0 0 rgba(255,255,255,0.45);
    }

    .fake-tag {
      position: absolute;
      left: 8px;
      bottom: 7px;
      z-index: 1;
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(5,45,52,0.52);
      color: #fff;
      font-size: 9px;
      font-weight: 950;
      letter-spacing: 0.05em;
    }

    .lines {
      align-self: center;
    }

    .line {
      height: 11px;
      border-radius: 999px;
      background: rgba(7,52,59,0.68);
      margin: 8px 0;
    }

    .line.short {
      width: 68%;
      opacity: 0.42;
    }

    .line.mid {
      width: 84%;
    }

    .actions {
      display: flex;
      gap: 7px;
      margin-top: 8px;
    }

    .action {
      padding: 6px 10px;
      border-radius: 999px;
      color: #086b74;
      background: rgba(0,215,255,0.12);
      font-size: 11px;
      font-weight: 950;
    }

    .action.primary {
      color: #fff;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      box-shadow: 0 10px 20px rgba(0, 160, 200, 0.2);
    }

    .save-flash {
      position: absolute;
      right: 20px;
      bottom: 26px;
      display: grid;
      place-items: center;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      color: white;
      font-size: 32px;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      box-shadow: 0 18px 42px rgba(0,160,200,0.28);
      animation: popSave 3s ease-in-out infinite;
    }

    @keyframes popSave {
      0%, 28% { opacity: 0; transform: scale(0.6); }
      43%, 68% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.12); }
    }

    .memo-layout {
      position: absolute;
      inset: 18px 14px 0;
    }

    .memo .video-card {
      margin-top: 62px;
    }

    .memo-note {
      position: absolute;
      right: 0;
      top: 188px;
      width: 214px;
      padding: 15px 16px;
      border-radius: 22px;
      color: #7a5c00;
      background: rgba(255, 248, 207, 0.94);
      border: 1px solid rgba(255, 210, 80, 0.5);
      box-shadow: 0 20px 46px rgba(130,95,0,0.18);
      transform: rotate(-3deg);
      font-weight: 900;
      line-height: 1.45;
      animation: notePulse 3s ease-in-out infinite;
    }

    .memo-note small {
      display: block;
      margin-bottom: 5px;
      color: rgba(122,92,0,0.58);
      letter-spacing: 0.06em;
      font-size: 11px;
    }

    .thumb-note {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 7px;
      z-index: 2;
      padding: 4px 7px;
      border-radius: 9px;
      color: #6c5300;
      background: rgba(255, 246, 185, 0.9);
      font-size: 9px;
      font-weight: 950;
    }

    @keyframes notePulse {
      0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
      50% { transform: translateY(-8px) rotate(-3deg) scale(1.03); }
    }

    .list-layout {
      position: absolute;
      inset: 20px 14px 0;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 13px 15px;
      border-radius: 22px;
      color: #0b5158;
      background: var(--glass);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      font-weight: 950;
      backdrop-filter: blur(22px);
    }

    .list-count {
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      font-size: 12px;
    }

    .list-cards {
      position: relative;
      height: 348px;
    }

    .list-card {
      position: absolute;
      left: 0;
      right: 0;
      min-height: 96px;
      display: grid;
      grid-template-columns: 38px 112px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: 24px;
      transition: transform 0.5s ease;
    }

    .list-card.one {
      top: 0;
      animation: reorderOne 3s ease-in-out infinite;
    }

    .list-card.two {
      top: 108px;
      animation: reorderTwo 3s ease-in-out infinite;
    }

    .list-card.three {
      top: 216px;
    }

    .drag-handle {
      width: 32px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #08717b;
      background: rgba(0,215,255,0.12);
      font-weight: 950;
    }

    @keyframes reorderOne {
      0%, 25% { transform: translateY(0) scale(1); z-index: 3; }
      45%, 72% { transform: translateY(108px) scale(1.03); z-index: 5; }
      100% { transform: translateY(0) scale(1); z-index: 3; }
    }

    @keyframes reorderTwo {
      0%, 25% { transform: translateY(0); }
      45%, 72% { transform: translateY(-108px); }
      100% { transform: translateY(0); }
    }

    .sync-layout {
      position: absolute;
      inset: 18px 14px 0;
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: start;
      gap: 14px;
    }

    .sync-card {
      padding: 18px;
      border-radius: 26px;
    }

    .devices {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 26px 0;
    }

    .device {
      position: relative;
      width: 72px;
      height: 104px;
      border-radius: 20px;
      background: linear-gradient(145deg, #eafffb, #b9fff1);
      border: 3px solid rgba(0,215,255,0.38);
      box-shadow: 0 0 28px rgba(0,215,255,0.22);
    }

    .device.pc {
      width: 132px;
      height: 86px;
      border-radius: 18px;
    }

    .device::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 18px;
      height: 4px;
      border-radius: 999px;
      background: rgba(6,85,92,0.36);
      transform: translateX(-50%);
    }

    .sync-beam {
      width: 72px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--mint), var(--cyan), var(--mint));
      background-size: 200% 100%;
      box-shadow: 0 0 22px rgba(0,215,255,0.4);
      animation: beam 1.4s linear infinite;
    }

    @keyframes beam {
      to { background-position: 200% 0; }
    }

    .login-button {
      margin: 4px auto 0;
      width: 84%;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      box-shadow: 0 16px 34px rgba(0,160,200,0.24);
      font-size: 18px;
      font-weight: 950;
    }

    .history-card {
      display: grid;
      grid-template-columns: 56px 1fr 46px;
      align-items: center;
      gap: 12px;
      min-height: 82px;
      padding: 13px;
      border-radius: 22px;
      color: #0b5158;
      font-weight: 900;
    }

    .history-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: white;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      font-size: 24px;
    }

    .check {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: linear-gradient(135deg, #00cfa2, #00a7ef);
      font-weight: 950;
    }

    .progress {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 12px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      z-index: 42;
      opacity: 0.75;
    }

    .bar {
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.46);
      overflow: hidden;
    }

    .bar::before {
      content: "";
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--mint), var(--cyan));
    }

    body[data-phase="subjects"] .bar:nth-child(1)::before,
    body[data-phase="units"] .bar:nth-child(2)::before,
    body[data-phase="videos"] .bar:nth-child(3)::before,
    body[data-phase="memo"] .bar:nth-child(4)::before,
    body[data-phase="list"] .bar:nth-child(5)::before,
    body[data-phase="sync"] .bar:nth-child(6)::before {
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      to { width: 100%; }
    }

    @media (max-height: 760px) {
      .phone-screen {
        top: 78px;
        bottom: 22px;
      }

      .bubble {
        width: calc(var(--s, 88px) * 0.9);
        height: calc(var(--s, 88px) * 0.9);
      }

      .list-cards {
        height: 320px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body data-phase="subjects">
  <main class="stage" aria-label="StudyTube TikTok demo">
    <header class="topbar">
      <div class="brand"><span class="mark" aria-hidden="true"></span>StudyTube</div>
      <nav class="nav" aria-label="主要機能">
        <div class="nav-pill">検索</div>
        <div class="nav-pill">履歴</div>
        <div class="nav-pill">リスト</div>
      </nav>
    </header>

    <section class="phone-screen">
      <div class="scene subjects">
        <div class="subject-field">
          <div class="bubble" style="--x: 22%; --y: 18%; --dur: 6.2s; --delay: -0.7s;"><span class="icon">国</span><strong>国語</strong></div>
          <div class="bubble math" style="--x: 52%; --y: 24%; --dur: 6.8s; --delay: -1.2s;"><span class="icon">Σ</span><strong>数学</strong></div>
          <div class="bubble" style="--x: 81%; --y: 20%; --dur: 7.2s; --delay: -1.8s;"><span class="icon">A</span><strong>英語</strong></div>

  <script>
    const phases = ["subjects", "units", "videos", "memo", "list", "sync"];
    const fixedPhase = new URLSearchParams(location.search).get("phase");
    let phaseIndex = 0;
    const stepMs = 3000;

    function setPhase() {
      document.body.dataset.phase = phases[phaseIndex];
      phaseIndex = (phaseIndex + 1) % phases.length;
    }

    if (phases.includes(fixedPhase)) {
      document.body.dataset.phase = fixedPhase;
    } else {
      setInterval(setPhase, stepMs);
    }
  </script>
